[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Global function configuration
  node_bundler = "esbuild"
  # 10 second timeout for all functions (default is 10s)
  timeout = 10
  # Maximum request body size (6MB default, we set 5MB for safety)
  included_files = ["netlify/functions/**"]

# =============================================================================
# SPA ROUTING - Redirect all routes to index.html for client-side routing
# =============================================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Don't apply to API routes or assets
  conditions = {path = ["!/.netlify/functions/*", "!/assets/*", "!/favicon.ico", "!/robots.txt"]}

# =============================================================================
# SECURITY HEADERS - Applied to all HTML pages
# =============================================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent XSS attacks (deprecated but still useful for older browsers)
    X-XSS-Protection = "1; mode=block"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Prevent clickjacking (also covered in CSP frame-ancestors)
    X-Frame-Options = "SAMEORIGIN"

    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Enable HSTS (HTTP Strict Transport Security)
    # Force HTTPS for 1 year, including all subdomains, allow preloading
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Permissions Policy (formerly Feature Policy)
    # Restrict access to browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # Content Security Policy (CSP) - Defense in depth
    # Note: 'unsafe-inline' and 'unsafe-eval' are required for React/Vite in production
    # Consider moving to nonce-based CSP in the future for better security
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://www.google.com https://www.gstatic.com https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.youtube.com https://api.zoom.us https://api.getgo.com https://connect.mailerlite.com wss://*.supabase.co; frame-src 'self' https://www.youtube.com https://*.supabase.co; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;"

    # Cross-Origin policies
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "cross-origin"

# =============================================================================
# STATIC ASSET CACHING - Aggressive caching with immutable flag
# =============================================================================
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache for 1 year with immutable flag (files are hashed, so safe)
    Cache-Control = "public, max-age=31536000, immutable"
    # Allow CORS for assets (fonts, etc.)
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "font/woff2"
    Access-Control-Allow-Origin = "*"

# =============================================================================
# API FUNCTION HEADERS - CORS and security for API endpoints
# =============================================================================
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    # Don't cache API responses by default
    Cache-Control = "no-cache, no-store, must-revalidate"
    # API-specific security headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    # Rate limit info (will be set dynamically by functions)
    Access-Control-Expose-Headers = "X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset"

# =============================================================================
# HTML CACHING - Short cache for HTML to allow quick updates
# =============================================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    # Cache for 5 minutes, must revalidate
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Never cache the main index.html (always fetch fresh)
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"